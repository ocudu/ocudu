# OCUDU component image build pipeline — Red Hat UBI9 variant.
#
# Builds the same component matrix as image-build.yml but on UBI9 base images
# for Red Hat container builds. Jobs run on RHEL-registered runners so
# that EPEL/CRB packages are available via the host subscription bind-mount.
#
# Stages:
#   build   — parallel matrix jobs, one per component × driver × arch/SIMD
#
# To add a driver, component, or SIMD variant: edit the matching .matrix-* template
# in .gitlab/ci/docker/image-matrix.yml.

stages:
  - build

# ---------------------------------------------------------------------------
# Base job — all RH build cells extend this
# ---------------------------------------------------------------------------
.image-build-rh:
  extends: .image-build-common
  timeout: 3 hours
  tags:
    - ocudu-rhel-${TARGETARCH}
  image: ${OCUDU_REGISTRY_URI}/rh-tool-cli:$RH_TOOL_CLI_VERSION
  variables:
    RH_TOOL_CLI_VERSION: "1.0.3"
    OS: registry.access.redhat.com/ubi9/ubi
    OS_VERSION: "9.6"
    IMAGE_TAG_OS: ubi9
    IMAGE_TAG_DRIVER: "true"
  before_script:
    - !reference [.image-build-common, before_script]
    - |
      ENT_DIR=/etc/pki/entitlement
      ENT_CERT=$(ls "$ENT_DIR"/*.pem 2>/dev/null | grep -v -- '-key.pem' | head -n1)
      ENT_KEY=$(ls "$ENT_DIR"/*-key.pem 2>/dev/null | head -n1)
      if [ -n "$ENT_CERT" ] && [ -n "$ENT_KEY" ]; then
        BUILD_SECRETS="\
        id=rh_entitlement_cert,src=${ENT_CERT};\
        id=rh_entitlement_key,src=${ENT_KEY};\
        id=rh_rhsm_conf,src=/etc/rhsm/rhsm.conf;\
        id=rh_rhsm_ca,src=/etc/rhsm/ca/redhat-uep.pem"
        export BUILD_SECRETS
      else
        echo "WARNING: No RH entitlement certs found at $ENT_DIR, subscription repos unavailable"
      fi
  needs: []

# ---------------------------------------------------------------------------
# Build jobs
# ---------------------------------------------------------------------------

build-rh:gnb:
  extends:
    - .image-build-rh
    - .matrix-image-rh-gnb

build-rh:du:
  extends:
    - .image-build-rh
    - .matrix-image-rh-du

build-rh:cu:
  extends:
    - .image-build-rh
    - .matrix-image-rh-cu

build-rh:cu-cp:
  extends:
    - .image-build-rh
    - .matrix-image-rh-cu-cp

build-rh:cu-up:
  extends:
    - .image-build-rh
    - .matrix-image-rh-cu-up

build-rh:ru-emulator:
  extends:
    - .image-build-rh
    - .matrix-image-rh-ru-emulator
