# Geographical coordinates of the gNB-DU cell/TRP antenna example configuration
#
# This is a supplementary configuration that reports the cell/TRP antenna position to the CU-CP in the F1AP
# TRP Information Response procedure (TS 38.473, Section 9.3.1.184). This file will be passed to the DU along with
# the base configuration at start-up. The following command may be used to run the DU with this configuration file:
#   sudo ./du -c du_rf_b200_tdd_n78_20mhz.yml -c geo_coordinates.yml

cell_cfg:
  geo_coordinates:
    # Normal-accuracy position (TS 38.473, Section 9.3.1.174). Mutually exclusive with 'high_accuracy' below -
    # exactly one of 'normal' or 'high_accuracy' must be present.
    normal:
      latitude: 52.520008             # degrees, range [-90, 90]
      longitude: 13.404954            # degrees, range [-180, 180]
      altitude: 35                    # metres
      uncertainty_semi_major: 10      # uncertainty code, r = 10 x (1.1^k - 1) metres, range [0, 127]
      uncertainty_semi_minor: 8       # uncertainty code, range [0, 127]
      orientation_of_major_axis: 45   # degrees, range [0, 179]
      uncertainty_altitude: 5         # uncertainty code, h = 45 x (1.025^k - 1) metres, range [0, 127]
      confidence: 90                  # percentage, range [0, 100]

      # High-accuracy position (TS 38.473, Section 9.3.1.190). To use this instead, remove/comment out 'normal'
      # above and uncomment the block below. Latitude, longitude and altitude are in real-world units and are
      # converted to their IE-encoded values using the TS 23.032, Sections 6.1a/6.3a scale factors.
      # high_accuracy:
      #   latitude: 52.520008             # degrees, range [-90, 90]
      #   longitude: 13.404954            # degrees, range [-180, 180]
      #   altitude: 35                    # metres, range [-500, 10000]
      #   uncertainty_semi_major: 100     # uncertainty code, r = 0.3 x (1.02^k - 1) metres, range [0, 255]
      #   uncertainty_semi_minor: 90      # uncertainty code, range [0, 255]
      #   orientation_of_major_axis: 45   # degrees, range [0, 179]
      #   horizontal_confidence: 90       # percentage, range [0, 100]
      #   uncertainty_altitude: 50        # uncertainty code, range [0, 255]
      #   vertical_confidence: 85         # percentage, range [0, 100]
